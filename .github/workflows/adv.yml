name: advance ci pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  # job 1: code quality[linting]
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: check code style
        run: |
          echo "checking code quality"
          echo "no linting error found"
          echo "code style is good!!!"

    # job2: test
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: run tests
        run : |
          echo "running test"
          npm test
          echo "all tets passed"

    # job 3 : build
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: create build folder
        run: |
          echo "building app"
          mkdir -p dist
          echo "console.log('prod build');" > dist/app.js
          echo "build complete"

      - name: artfacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
      - name: build successful
        run: |
          echo "build pass" >> $GITHUB_STEP_SUMMARY
          echo "lint pass" >> $GITHUB_STEP_SUMMARY
          echo "test pass" >> $GITHUB_STEP_SUMMARY
          echo "build created in dist/" >> $GITHUB_STEP_SUMMARY
